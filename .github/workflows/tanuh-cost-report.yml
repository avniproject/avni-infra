name: Tanuh monthly AWS cost report

# Emails the previous month's Tanuh AWS spend (resources tagged Client=tanuh)
# to the operations team for pass-through billing. The Python script builds AND
# sends the report itself — the confidential cost figures never touch this
# workflow's (public, world-readable) log; only a status line is printed.
#
# Prerequisites (see reportingSystem/tanuh-metabase/COST_TRACKING.md):
#   - IAM role tanuh-cost-report-gha-role (trust scoped to refs/heads/master).
#   - SES domain identity avniproject.org verified in ap-south-1, prod access.
#   - Repo SECRET TANUH_COST_REPORT_RECIPIENTS (comma-separated ops addresses).
#     A secret, not a variable — this repo is public.

on:
  schedule:
    # 02:30 UTC on the 2nd of each month (~08:00 IST), a day after month-end so
    # Cost Explorer figures for the closed month have settled.
    - cron: '30 2 2 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to report (YYYY-MM). Leave blank for previous month.'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write   # OIDC AssumeRoleWithWebIdentity only

jobs:
  cost-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AWS_REGION: ap-south-1
      # tanuh-cost-report-gha-role — created from cost-report-trust-policy.json
      # / cost-report-policy.json (see COST_TRACKING.md).
      AWS_ROLE_ARN: arn:aws:iam::118388513628:role/tanuh-cost-report-gha-role

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate month input
        env:
          MONTH: ${{ github.event.inputs.month }}
        run: |
          set -euo pipefail
          # Untrusted dispatch input — validate via an env var, never inline it
          # into the shell, and bail before any AWS call if it's malformed.
          if [[ -n "${MONTH}" && ! "${MONTH}" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
            echo "::error::month must be YYYY-MM (got '${MONTH}')"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install boto3
        run: pip install --quiet boto3

      - name: Configure AWS credentials via OIDC
        # Pin to a release SHA in production for supply-chain safety; v4 kept
        # here to match the repo's other workflows.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and email cost report
        env:
          MONTH: ${{ github.event.inputs.month }}
          TANUH_COST_REPORT_RECIPIENTS: ${{ secrets.TANUH_COST_REPORT_RECIPIENTS }}
          SES_REGION: ap-south-1
        run: |
          set -euo pipefail
          ARGS=()
          if [[ -n "${MONTH}" ]]; then
            ARGS+=(--month "${MONTH}")
          fi
          python3 billing/tanuh_cost_report.py "${ARGS[@]}"
