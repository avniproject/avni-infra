---
- name: Stop existing Autopilot service if running
  systemd:
    name: "{{ application_name }}"
    state: stopped
  become: yes
  ignore_errors: yes

- name: Check if current deployment exists
  stat:
    path: "{{ application_dir }}/current"
  register: current_deployment

- name: Backup current deployment
  block:
    - name: Generate backup name
      set_fact:
        backup_name: "backup-{{ ansible_date_time.year }}{{ ansible_date_time.month }}{{ ansible_date_time.day }}-{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}{{ ansible_date_time.second }}"

    - name: Archive current deployment
      archive:
        path: "{{ application_dir }}/current"
        dest: "{{ autopilot_backup_dir }}/{{ backup_name }}.tar.gz"
        format: gz
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: '0644'
      become: yes

    - name: Recreate empty current directory
      file:
        path: "{{ application_dir }}/current"
        state: "{{ item }}"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: '0755'
      become: yes
      loop:
        - absent
        - directory

    - name: Keep only the last 5 backups
      shell: |
        cd {{ autopilot_backup_dir }}
        ls -t | tail -n +6 | xargs -r rm -rf
      become: yes
      become_user: "{{ application_user }}"
  when: current_deployment.stat.exists

- name: Copy deploy tarball to target
  copy:
    remote_src: no
    src: "{{ application_zip_path }}/{{ application_zip_file_name }}"
    dest: "{{ application_dir }}/current/"
    owner: "{{ application_user }}"
    group: "{{ application_group }}"
    mode: '0644'

- name: Extract deploy tarball
  unarchive:
    src: "{{ application_dir }}/current/{{ application_zip_file_name }}"
    dest: "{{ application_dir }}/current"
    owner: "{{ application_user }}"
    group: "{{ application_group }}"
    remote_src: yes
  become: yes

- name: Install Python dependencies with uv
  shell: |
    cd {{ application_dir }}/current
    export PATH="$HOME/.local/bin:$PATH"
    uv sync --no-dev
  become: yes
  become_user: "{{ application_user }}"

- name: Start Autopilot service
  systemd:
    name: "{{ application_name }}"
    state: started
  become: yes

- name: Wait for service to start listening
  wait_for:
    port: "{{ appserver_port }}"
    host: "{{ autopilot_host }}"
    delay: 5
    timeout: 60

- name: Display service status
  command: systemctl status {{ application_name }} --no-pager
  become: yes
  register: service_status
  changed_when: false

- name: Show service status
  debug:
    msg: "{{ service_status.stdout_lines }}"

- name: Show recent service logs
  command: journalctl -u {{ application_name }} --no-pager -n 20
  become: yes
  register: recent_logs
  changed_when: false

- name: Display recent logs
  debug:
    msg: "{{ recent_logs.stdout_lines }}"

- name: Clean up tarball on target
  file:
    path: "{{ application_dir }}/current/{{ application_zip_file_name }}"
    state: absent
  become: yes

- name: Log deployment completion
  debug:
    msg: "avni-autopilot deployment completed."
