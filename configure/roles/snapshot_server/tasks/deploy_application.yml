---
- name: Stop existing snapshot-server service if running
  systemd:
    name: "{{ application_name }}"
    state: stopped
  become: yes
  ignore_errors: yes

- name: Check if current deployment exists
  stat:
    path: "{{ application_dir }}/current"
  register: current_deployment

- name: Backup current deployment
  block:
    - name: Generate backup name
      set_fact:
        backup_name: "backup-{{ ansible_date_time.year }}{{ ansible_date_time.month }}{{ ansible_date_time.day }}-{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}{{ ansible_date_time.second }}"

    - name: Move existing deployment into backups
      command: mv "{{ application_dir }}/current" "{{ snapshot_server_backup_dir }}/{{ backup_name }}"
      become: yes

    - name: Recreate current deployment directory
      file:
        path: "{{ application_dir }}/current"
        state: directory
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: '0755'
      become: yes

    - name: Keep only last 5 backups
      shell: |
        cd {{ snapshot_server_backup_dir }}
        ls -t | tail -n +6 | xargs -r rm -rf
      become: yes
      become_user: "{{ application_user }}"
  when: current_deployment.stat.exists
  become: yes

- name: Copy deployable tarball
  copy:
    remote_src: no
    src: "{{ application_zip_path }}/{{ application_zip_file_name }}"
    dest: "{{ application_dir }}/current/{{ application_zip_file_name }}"
    owner: "{{ application_user }}"
    group: "{{ application_group }}"
    mode: '0644'

- name: Extract tarball
  unarchive:
    src: "{{ application_dir }}/current/{{ application_zip_file_name }}"
    dest: "{{ application_dir }}/current"
    owner: "{{ application_user }}"
    group: "{{ application_group }}"
    remote_src: yes
  become: yes

- name: Remove the tarball from current dir
  file:
    path: "{{ application_dir }}/current/{{ application_zip_file_name }}"
    state: absent
  become: yes

- name: Start snapshot-server service
  systemd:
    name: "{{ application_name }}"
    state: started
  become: yes

- name: Wait for /health to respond
  uri:
    url: "http://{{ snapshot_server_host }}:{{ appserver_port }}/health"
    method: GET
    status_code: 200
    timeout: 5
  register: health
  retries: 10
  delay: 3
  until: health.status == 200

- name: Display service status
  command: systemctl status {{ application_name }} --no-pager
  become: yes
  register: service_status

- name: Show service status
  debug:
    msg: "{{ service_status.stdout_lines }}"

- name: Show recent service logs
  command: journalctl -u {{ application_name }} --no-pager -n 20
  become: yes
  register: recent_logs

- name: Display recent logs
  debug:
    msg: "{{ recent_logs.stdout_lines }}"

- name: Log deployment completion
  debug:
    msg: "snapshot-server deployment completed"
