---

- name: Install aptitude
  apt:
    name: aptitude
    state: latest
    update_cache: true

- name: Install required system packages
  apt:
    update_cache: "{{ update_apt_cache }}"
    state: latest
    pkg:
      - apt-transport-https
      - ca-certificates
      - python3-pip
      - virtualenv
      - python3-setuptools

- name: Create cache dir for the rest
  become: true
  file:
    state: directory
    path: "{{ avni_cache_dir }}"
    mode: 777

- name: Add Docker GPG apt Key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker Repository
  apt_repository:
    repo: "deb https://download.docker.com/linux/ubuntu {{ docker_apt_release | default('focal') }} stable"
    state: present

- name: Update apt and install docker-ce
  apt:
    name: docker-ce
    state: latest
    update_cache: "{{ update_apt_cache }}"

- name: Ensure docker service is started and enabled
  service:
    name: docker
    state: started
    enabled: yes

- name: Install Docker Module for Python
  pip:
    name: docker

- name: Pull Docker image
  community.docker.docker_image:
    name: "{{ docker_container_image }}"
    source: pull

- name: Set environment file for application
  template:
    src: "{{ docker_container_env_template_file }}"
    dest: "{{ docker_container_env_file }}"
    owner: root
    group: root
    mode: '755'

- name: Create default containers
  community.docker.docker_container:
    name: "{{ docker_container_name }}"
    image: "{{ docker_container_image }}"
    detach: true
    state: started
    restart: true
    restart_policy: always
    ports:
      - "{{ docker_container_ports_mapping }}"
    env_file: "{{ docker_container_env_file }}"
    log_driver: "{{ docker_container_log_driver }}"
    log_options: "{{ docker_container_log_options }}"
    etc_hosts: "{{ docker_container_etc_hosts }}"
    runtime: "{{ docker_container_runtime }}"
    # Memory cap is optional and omitted when undefined (the existing prod
    # metabase deploy leaves this unset, preserving prior behavior).
    memory: "{{ docker_container_memory_limit | default(omit) }}"
    healthcheck:
      test: "{{ docker_container_healthcheck_cmd }}"
      interval: 15s
      timeout: 5s
      retries: 5



