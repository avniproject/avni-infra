env: staging
#Common variables
ufw_allowed_ports:
  - "22"
  - "80"
  - "443"
  - "3000"
  - "8021"
  - "8023"

## Integration server variables
int_appserver_app_url: "int-staging.avniproject.org"
goonj_sf_app_url: "https://goonj--patialv1.sandbox.my.salesforce.com/services/apexrest/v1"
goonj_sf_auth_url: "https://test.salesforce.com/services/oauth2/token"
goonj_sf_media_url_prefix: "https://staging.avniproject.org/web/media?url="
amrit_server_url: "http://amritwprdev.piramalswasthya.org:8080"
goonj_schedule_cron: "0 0/10 * * * ?"
power_schedule_cron: "0 0 * * * ?"
amrit_schedule_cron: "0 0/2 * * * ?"
goonj_app_tasks: "all"
amrit_app_tasks: "None"
goonj_recreate_dispatch_receipt: "true"
lahi_glific_gcp_project_id: "glific-lms-lahi"
lahi_glific_gcp_dataset_name: "918956411022"
lahi_glific_gcp_project_credentials_path: "/etc/lahi_glific_gcp_bigquery_conf.json"
lahi_avni_api_url: "https://app.avniproject.org"
lahi_schedule_cron: "-"
int_server_opts: " --enable-preview"

## ETL server variables
etl_appserver_app_url: "int-staging.avniproject.org"

bugsnag_stage: "staging"

etl_allowed_origins: "https://staging.avniproject.org,https://int-staging.avniproject.org"
avni_idp_type: "cognito"
avni_endpoint_end_of_life_1: "2024-09-05"
scheduled_job_trigger_misfire_threshold: "2700000"
scheduled_job_repeat_interval: "60"
avni_server_host: "localhost"
avni_server_port: "8021"
avni_server_opts: " -Dnewrelic.environment={{ newrelic_environment }} -javaagent:/opt/newrelic/newrelic.jar -Dlogging.file.name={{avni_server_access_log_dir}}/chs.log -Dlogging.logback.rollingpolicy.max-file-size=5mb -Dlogging.logback.rollingpolicy.max-history=90 -Xmx1512m -XX:+HeapDumpOnOutOfMemoryError -XX:OnOutOfMemoryError=\"/bin/kill -9 %p\" -XX:HeapDumpPath=/var/log/avni_server/ -XX:ErrorFile={{avni_server_access_log_dir}}/jvm.log -Xdebug -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5005 -XX:-OmitStackTraceInFastThrow"
avni_server_db_host: "stagingdb.avniproject.org."
avni_server_db_port: "5432"
avni_server_db_schema: "public"
avni_server_mode: "staging"
avni_server_media_bucket_name: "staging-user-media"
avni_server_static_content_path: "/var/www/avni_server/"
avni_server_open_redirect_url: "https://play.google.com/store/apps/details?id=com.openchsclient"
avni_server_minio_enabled: "false"
avni_reporting_metabase_self_service_enabled: "true"
avni_server_minio_url: "https://minio-staging.avniproject.org:442"
avni_server_bugsnag_release_stage: "staging"
avni_server_keycloak_url: "https://keycloak-staging.avniproject.org"
avni_server_keycloak_enabled: "false"
avni_server_access_log_dir: "/var/log/avni_server"
avni_server_cache_max_entries: "100"
avni_server_cache_ttl_seconds: "600"
avni_server_cache_max_weight: "1000"
avni_server_show_sql: "false"
avni_server_idp_type: "cognito"
avni_server_etl_service_origin: "https://int-staging.avniproject.org/etl"
avni_csrf_enabled: "false"
avni_web_validhosts: ""
openchs_csp_enabled: "false"
openchs_csp_allowed_hosts: ""
avni_enhanced_validation: "false"
avni_blacklisted_urls: '["/profile/**", "/manifest.json"]'
avni_blacklisted_urls_file_path: "/etc/avni_blacklisted_urls.json"
avni_send_exception_in_response: "true"
avni_webapp_timeout: "21600"
avni_server_legacy_longitudinal_export_limit: "30000"

newrelic_app_name: "avni"
newrelic_environment: "staging"
newrelic_agent_enabled: "false"
newrelic_application_logging_enabled: "false"
newrelic_distributed_tracing_enabled: "false"

avni_reporting_system_0_name: "Metabase Reports"
avni_reporting_system_0_url: "https://reporting-green.avniproject.org"
avni_reporting_system_1_name: "Jasper Reports"
avni_reporting_system_1_url: "https://reporting-jasper.avniproject.org/jasperserver/login.html"
avni_reporting_system_2_name: "Superset Reports"
avni_reporting_system_2_url: "https://reporting-superset.avniproject.org/login/"
avni_reporting_metabase_api_url: "https://reporting-green.avniproject.org/api"
metabase_db_url: "jdbc:postgresql://stagingdb.avniproject.org:5432/reportingdb"

avni_scheduled_job_storage_management_cron: "0 0 * * * *"

## AI server variables
avni_ai_server_url: "https://staging-ai.avniproject.org"

## Autopilot (avni-autopilot) variables
autopilot_avni_server_base_url: "http://127.0.0.1:8021"
autopilot_webapp_origin: "https://staging.avniproject.org,http://localhost:6010"

# Copilot variables
avni_copilot_token: "ynGfdvGlFWJhmetX"
avni_copilot_enabled: "true"
avni_base_url: "https://staging.avniproject.org"
avni_show_templates: "true"

## snapshot-server variables (deployed alongside staging avni-server for smoke testing)
snapshot_server_application_name: "snapshot-server"
snapshot_server_user: "snapshot-server-user"
snapshot_server_group: "snapshot-server-user"
snapshot_server_port: "3030"
snapshot_server_host: "127.0.0.1"
snapshot_server_service_dir: "/etc/systemd/system"
snapshot_server_root_dir: "/opt/snapshot-server"
snapshot_server_backup_dir: "/opt/snapshot-server/backups"
snapshot_server_log_dir: "/var/log/snapshot-server"
snapshot_server_state_db_dir: "/opt/snapshot-server/state"
snapshot_server_state_db_path: "/opt/snapshot-server/state/snapshot-server.db"
snapshot_server_snapshots_dir: "/opt/snapshot-server/snapshots"
snapshot_server_log_level: "info"
snapshot_server_replica_lag_minutes: "10"
snapshot_server_page_size: "2000"
snapshot_server_max_concurrency: "2"
# Staging avni-server runs IdpType=cognito so snapshot-server has to talk
# to it over the public URL with a real AUTH_TOKEN. Add the token to
# staging-secret-vars.yml.enc as snapshot_server_auth_token before deploy.
avni_server_url_for_snapshot: "https://staging.avniproject.org"
# Leave bucket empty to disable S3 uploads — snapshots stay on disk in
# /opt/snapshot-server/snapshots. Override once an S3 bucket is provisioned.
snapshot_server_s3_bucket: ""
snapshot_server_s3_region: "ap-south-1"
