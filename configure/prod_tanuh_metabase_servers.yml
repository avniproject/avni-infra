---

- name: Configure Tanuh Metabase server
  hosts: tanuh_metabase_server
  become: yes
  become_user: root
  remote_user: "{{ application_user }}"
  tags:
    - tanuh_metabase
  vars:
    perform_aptitude_dist_upgrade: no
  vars_files:
    # Load order matters. `prod-secret-vars.yml.enc` contains the EXISTING
    # prod metabase's `mb_db_*` keys (consumed by `prod_metabase_servers.yml`).
    # `tanuh_metabase_docker_vars.yml` MUST be loaded LAST so its
    # `mb_db_*: "{{ tanuh_mb_db_* }}"` mappings override the existing values
    # for this playbook only.
    - group_vars/basic_docker_vars.yml
    - group_vars/prod_vars.yml
    - group_vars/prod-secret-vars.yml.enc
    - group_vars/tanuh_metabase_docker_vars.yml
  roles:
    - base
    - security
    - ecr_docker_auth
    - metabase
    - tanuh_maintenance
    # Prod physician app (tanuh.avniproject.org, :8080). Deployed by
    # `make tanuh-webapp-prod` (--tags tanuh_webapp) and by any untagged run of
    # this playbook (e.g. `make tanuh-metabase-prod`) — unchanged behaviour.
    - role: tanuh_webapp
      vars:
        # Prod pins a RELEASE TAG — UAT tracks `main`, prod never auto-drifts to
        # `main`. v1.5.0 == the commit prod currently runs, so a bare
        # `make tanuh-webapp-prod` is a no-op. Bump this to a newer tag to
        # promote, after UAT sign-off (see tanuh-webapp README "Releases & promotion").
        tanuh_webapp_git_ref: v1.5.0
      tags: [tanuh_webapp]
    # UAT physician app (uat-tanuh.avniproject.org, :8081) on the SAME host,
    # backed by the Tanuh_UAT org on prod Avni. Guarded so it deploys ONLY when
    # `tanuh_webapp_uat` is explicitly requested (`make tanuh-webapp-uat`):
    #   - `--tags tanuh_webapp` (prod deploy)  -> not selected -> skipped
    #   - untagged run (`make tanuh-metabase-prod`, ansible_run_tags == ['all'])
    #     -> selected by tag but `when` is false -> skipped
    # so the prod webapp / metabase are never touched by the UAT instance.
    - role: tanuh_webapp
      vars:
        tanuh_webapp_instance_name: tanuh-webapp-uat
        tanuh_webapp_listen_port: 8081
        tanuh_webapp_server_name: uat-tanuh.avniproject.org
        tanuh_webapp_git_ref: main
      tags: [tanuh_webapp_uat]
      when: "'tanuh_webapp_uat' in ansible_run_tags"
